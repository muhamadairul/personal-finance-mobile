name: pencatat_keuangan
description: "Aplikasi Pencatat Keuangan Pribadi"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # HTTP & API
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  sqflite: ^2.4.1

  # Charts
  fl_chart: ^0.70.2

  # Formatting & Fonts
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # File & Export
  path_provider: ^2.1.5
  file_picker: ^8.1.7

  # UI Enhancements
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.1

  # Image Picker
  image_picker: ^1.1.2

  # File Opening
  open_file: ^3.5.10

  # QR Code (for native QRIS payment display)
  qr_flutter: ^4.1.0

  # Social Auth
  google_sign_in: ^6.2.2

  # Firebase & Push Notifications
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
